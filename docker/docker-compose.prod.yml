services:
  postgres:
    env_file:
      - .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    env_file:
      - .env.prod
    environment:
      ENVIRONMENT: production
    volumes:
      - uploads_data:/app/uploads
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  frontend:
    env_file:
      - .env.prod

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf.template:/etc/nginx/templates/default.conf.template:ro

  migrate:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    entrypoint: ["alembic", "upgrade", "head"]
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  uploads_data:
